name: Nightly Tennis & Health Report

on:
  schedule:
    # 9:30 PM IST = 16:00 UTC
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m agents.orchestrator

      - name: Commit memory & report updates
        run: |
          git config user.email "healthvault-bot@users.noreply.github.com"
          git config user.name "Health Vault Bot"
          git add vault/agents/ || true
          git diff --staged --quiet || git commit -m "agent: nightly update $(date -u +%Y-%m-%d)"
          git push
